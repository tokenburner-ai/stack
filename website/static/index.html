<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Product</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 700px;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            display: block;
        }
        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 24px var(--accent-glow);
        }
        .card-icon { font-size: 2rem; margin-bottom: 0.75rem; }
        .card h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .card p { color: var(--text-muted); font-size: 0.9rem; }
        .hero-cards {
            position: relative;
            z-index: 1;
            padding: 0 2rem 4rem;
        }
    </style>
</head>
<body>
    <section class="hero" style="min-height:60vh">
        <div class="hero-backdrop">
            <canvas id="flames"></canvas>
        </div>
        <div class="hero-content">
            <h1>Burned a few to build this</h1>
        </div>
    </section>

    <div class="hero-cards">
        <div class="cards">
            <a href="/docs" class="card">
                <div class="card-icon">&#128196;</div>
                <h3>API Docs</h3>
                <p>Explore and test your API endpoints interactively.</p>
            </a>
            <a href="/drive" class="card">
                <div class="card-icon">&#128190;</div>
                <h3>Drive</h3>
                <p>Your private file drive — upload, preview, and organize files backed by S3.</p>
            </a>
        </div>
    </div>

    <footer>
        <div class="footer-brand">
            <span class="footer-flame">&#x1F525;</span>
            Brought to you by <a href="https://github.com/tokenburner-ai">tokenburner</a>
        </div>
    </footer>

    <script>
    (function() {
        const canvas = document.getElementById('flames');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let w, h;

        function resize() {
            const hero = canvas.parentElement;
            w = canvas.width = hero.offsetWidth;
            h = canvas.height = hero.offsetHeight;
        }

        function Particle() { this.reset(); }

        Particle.prototype.reset = function() {
            this.x = Math.random() * w;
            this.y = h + Math.random() * 40;
            this.vx = (Math.random() - 0.5) * 0.8;
            this.vy = -(1.5 + Math.random() * 2.5);
            this.life = 1;
            this.decay = 0.005 + Math.random() * 0.015;
            this.size = 1 + Math.random() * 2.5;
            const t = Math.random();
            if (t < 0.4) {
                this.r = 255; this.g = 120 + Math.random() * 80; this.b = 20;
            } else if (t < 0.7) {
                this.r = 255; this.g = 60 + Math.random() * 40; this.b = 10;
            } else if (t < 0.9) {
                this.r = 80 + Math.random() * 60; this.g = 140 + Math.random() * 80; this.b = 255;
            } else {
                this.r = 200 + Math.random() * 55; this.g = 200 + Math.random() * 55; this.b = 255;
            }
        };

        Particle.prototype.update = function() {
            this.x += this.vx + (Math.random() - 0.5) * 0.3;
            this.vy *= 0.995;
            this.y += this.vy;
            this.life -= this.decay;
            if (this.life <= 0) this.reset();
        };

        Particle.prototype.draw = function() {
            const alpha = this.life * 0.7;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${alpha})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * this.life * 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${alpha * 0.15})`;
            ctx.fill();
        };

        function init() {
            resize();
            const count = Math.min(Math.floor(w * 0.15), 200);
            particles = [];
            for (let i = 0; i < count; i++) {
                const p = new Particle();
                p.y = Math.random() * h;
                p.life = Math.random();
                particles.push(p);
            }
        }

        function loop() {
            ctx.clearRect(0, 0, w, h);
            for (const p of particles) { p.update(); p.draw(); }
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', () => { resize(); init(); });
        init();
        loop();
    })();
    </script>
</body>
</html>
