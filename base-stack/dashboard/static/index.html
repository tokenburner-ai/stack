<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tokenburner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #050508;
    color: #f0f0f0;
    min-height: 100vh;
    padding: 2.5rem 1.5rem 4rem;
  }
  header {
    max-width: 1100px;
    margin: 0 auto 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .flame { font-size: 1.75rem; line-height: 1; }
  h1 {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff, #f97316, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .key-widget {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: #111118;
    border: 1px solid #23232e;
    padding: 0.45rem 0.75rem;
    border-radius: 6px;
    font-size: 0.85rem;
    color: #999;
  }
  .key-widget code {
    color: #f97316;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.8rem;
  }
  .key-widget button {
    background: transparent;
    color: #888;
    border: 1px solid #333;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .key-widget button:hover { color: #f97316; border-color: #f97316; }

  main { max-width: 1100px; margin: 0 auto; }

  .intro {
    color: #888;
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }

  #gate {
    max-width: 440px;
    margin: 4rem auto;
    background: #0c0c12;
    border: 1px solid #23232e;
    padding: 2rem;
    border-radius: 10px;
    text-align: center;
  }
  #gate h2 { margin-bottom: 0.5rem; color: #fff; font-size: 1.2rem; }
  #gate p { color: #888; font-size: 0.9rem; margin-bottom: 1.25rem; }
  #gate input {
    width: 100%;
    background: #050508;
    border: 1px solid #333;
    color: #fff;
    padding: 0.6rem 0.75rem;
    border-radius: 6px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.85rem;
    margin-bottom: 0.75rem;
  }
  #gate input:focus { outline: none; border-color: #f97316; }
  #gate button {
    width: 100%;
    background: #f97316;
    color: #050508;
    border: none;
    padding: 0.6rem;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
  }
  #gate-error { color: #f87171; font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .card {
    background: #0c0c12;
    border: 1px solid #23232e;
    border-radius: 10px;
    padding: 1.25rem;
    transition: border-color 0.15s, transform 0.15s;
  }
  .card:hover { border-color: #f97316; transform: translateY(-2px); }
  .card h3 {
    font-size: 1.05rem;
    margin-bottom: 0.35rem;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .card .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
  .card .dot.unknown { background: #555; }
  .card .dot.error { background: #f87171; }
  .card p {
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    line-height: 1.45;
  }
  .card .links {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    font-size: 0.85rem;
  }
  .card .links a {
    color: #f97316;
    text-decoration: none;
    border: 1px solid #333;
    padding: 0.3rem 0.65rem;
    border-radius: 5px;
    transition: border-color 0.15s, color 0.15s;
  }
  .card .links a:hover { border-color: #f97316; color: #fff; }

  .empty {
    text-align: center;
    color: #666;
    padding: 4rem 1rem;
    border: 1px dashed #23232e;
    border-radius: 10px;
  }
  .empty h3 { color: #aaa; margin-bottom: 0.5rem; }
  .empty code {
    color: #f97316;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.85rem;
    background: #111118;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
  }

  footer {
    max-width: 1100px;
    margin: 3rem auto 0;
    color: #555;
    font-size: 0.8rem;
    text-align: center;
  }
  footer a { color: #777; }
</style>
</head>
<body>

<div id="gate" hidden>
  <h2>API key required</h2>
  <p>Paste the key printed by <code>tokenburner install</code>.</p>
  <input id="gate-input" type="password" placeholder="sk_..." autocomplete="off">
  <button id="gate-submit">Unlock</button>
  <div id="gate-error"></div>
</div>

<div id="app" hidden>
  <header>
    <div class="brand">
      <span class="flame">&#x1F525;</span>
      <h1>Tokenburner</h1>
    </div>
    <div class="key-widget">
      <span>key</span>
      <code id="key-preview">sk_…</code>
      <button id="logout">Forget</button>
    </div>
  </header>

  <main>
    <p class="intro">Installed features in this stack. Each card links to its own API docs and health status.</p>
    <div id="cards" class="cards"></div>
  </main>

  <footer>
    <a href="https://github.com/tokenburner-ai">tokenburner-ai</a> · self-hosted on your AWS account
  </footer>
</div>

<script>
const KEY_STORAGE = "tokenburner_api_key";

function getKey() {
  const urlKey = new URLSearchParams(location.search).get("key");
  if (urlKey) {
    sessionStorage.setItem(KEY_STORAGE, urlKey);
    history.replaceState({}, "", location.pathname);
    return urlKey;
  }
  return sessionStorage.getItem(KEY_STORAGE);
}

function setKey(k) { sessionStorage.setItem(KEY_STORAGE, k); }
function clearKey() { sessionStorage.removeItem(KEY_STORAGE); }

async function verifyKey(key) {
  const resp = await fetch("/api/key/verify", { headers: { "X-API-Key": key } });
  return resp.ok ? resp.json() : null;
}

async function loadFeatures(key) {
  const resp = await fetch("/api/features", { headers: { "X-API-Key": key } });
  if (!resp.ok) return [];
  const data = await resp.json();
  return data.features || [];
}

async function checkHealth(url) {
  if (!url) return "unknown";
  try {
    const resp = await fetch(url, { method: "GET", mode: "no-cors", cache: "no-store" });
    return "ok";
  } catch {
    return "error";
  }
}

function renderCards(features, key) {
  const host = document.getElementById("cards");
  host.innerHTML = "";
  if (!features.length) {
    host.innerHTML = `
      <div class="empty" style="grid-column: 1/-1;">
        <h3>No features installed yet</h3>
        <p>Add features from the manifest:</p>
        <p style="margin-top: .75rem;"><code>tokenburner install</code></p>
      </div>`;
    return;
  }
  for (const f of features) {
    const card = document.createElement("div");
    card.className = "card";
    const url = f.url || "";
    const docsUrl = f.docs_url || (url ? url + "/docs" : "");
    const withKey = (u) => u && key ? (u + (u.includes("?") ? "&" : "?") + "key=" + encodeURIComponent(key)) : u;
    card.innerHTML = `
      <h3><span class="dot unknown"></span>${f.title || f.name}</h3>
      <p>${f.description || ""}</p>
      <div class="links">
        ${url ? `<a href="${withKey(url)}" target="_blank" rel="noopener">Open</a>` : ""}
        ${docsUrl ? `<a href="${withKey(docsUrl)}" target="_blank" rel="noopener">API docs</a>` : ""}
      </div>`;
    host.appendChild(card);
  }
}

async function showApp(key) {
  document.getElementById("gate").hidden = true;
  document.getElementById("app").hidden = false;
  document.getElementById("key-preview").textContent = key.slice(0, 6) + "…" + key.slice(-4);
  const features = await loadFeatures(key);
  renderCards(features, key);
}

function showGate(errorMsg) {
  document.getElementById("app").hidden = true;
  document.getElementById("gate").hidden = false;
  document.getElementById("gate-error").textContent = errorMsg || "";
}

async function init() {
  const key = getKey();
  if (!key) return showGate();
  const verified = await verifyKey(key);
  if (!verified) {
    clearKey();
    return showGate("Key rejected. Try again.");
  }
  showApp(key);
}

document.getElementById("gate-submit").addEventListener("click", async () => {
  const k = document.getElementById("gate-input").value.trim();
  if (!k) return;
  const ok = await verifyKey(k);
  if (!ok) {
    document.getElementById("gate-error").textContent = "That key didn't work.";
    return;
  }
  setKey(k);
  showApp(k);
});

document.getElementById("gate-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("gate-submit").click();
});

document.getElementById("logout").addEventListener("click", () => {
  clearKey();
  location.reload();
});

init();
</script>

</body>
</html>
